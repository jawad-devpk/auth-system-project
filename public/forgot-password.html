<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Forgot Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page-shell single-page">
    <section class="auth-card narrow-card">
      <a class="back-link" href="/login.html">Back to login</a>
      <div class="panel-header">
        <p class="eyebrow">Forgot Password</p>
        <h1>Email par OTP bhejiye.</h1>
      </div>

      <div id="messageBox" class="message-box hidden" aria-live="polite"></div>

      <form id="forgotPasswordForm" class="auth-form">
        <label>
          Email
          <input type="email" name="email" placeholder="you@example.com" required>
        </label>
        <button class="primary-btn" type="submit">Send OTP</button>
      </form>

      <p class="form-footer">
        OTP mil gaya? <a href="/verify-otp.html">Verify OTP</a>
      </p>
    </section>
  </main>

  <script src="/js/forgot-password.js"></script>
</body>
</html>
