<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Verify OTP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page-shell single-page">
    <section class="auth-card narrow-card">
      <a class="back-link" href="/forgot-password.html">Back</a>
      <div class="panel-header">
        <p class="eyebrow">Verify OTP</p>
        <h1>Received OTP verify kijiye.</h1>
      </div>

      <div id="messageBox" class="message-box hidden" aria-live="polite"></div>

      <form id="verifyOtpForm" class="auth-form">
        <label>
          Email
          <input id="emailInput" type="email" name="email" placeholder="you@example.com" required>
        </label>
        <label>
          OTP
          <input id="otp" type="text" name="otp" placeholder="6 digit OTP" maxlength="6" required>
        </label>
        <button class="primary-btn" type="submit">Verify OTP</button>
      </form>

      <p class="form-footer">
        OTP resend karna hai? <a href="/forgot-password.html">Back to forgot password</a>
      </p>
    </section>
  </main>

  <script src="/js/verify-otp.js"></script>
</body>
</html>
