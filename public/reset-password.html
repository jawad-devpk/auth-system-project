<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="page-shell single-page">
    <section class="auth-card narrow-card">
      <a class="back-link" href="/login.html">Back to login</a>
      <div class="panel-header">
        <p class="eyebrow">Reset Password</p>
        <h1>Naya password set kijiye.</h1>
      </div>

      <div id="messageBox" class="message-box hidden" aria-live="polite"></div>

      <form id="resetPasswordForm" class="auth-form">
        <label>
          Email
          <input id="emailInput" type="email" name="email" placeholder="you@example.com" required>
        </label>
        <label>
          New password
          <input type="password" name="newPassword" placeholder="Enter new password" required>
        </label>
        <label>
          Confirm password
          <input type="password" name="confirmPassword" placeholder="Confirm new password" required>
        </label>
        <button class="primary-btn" type="submit">Reset password</button>
      </form>

      <p class="form-footer">
        Back to <a href="/login.html">Login</a>
      </p>
    </section>
  </main>

  <script src="/js/reset-password.js"></script>
</body>
</html>
